syntax = "proto3";

package gitaly;

option go_package = "gitlab.com/gitlab-org/gitaly/v16/proto/go/gitalypb";

message Repository {
  string storage_name = 1;
  string relative_path = 2;
  bool git_object_directory = 4;
  string git_alternate_object_directories = 5;
  bool git_attributes_repository = 7;
  string gl_project_path = 8;
  string gl_repository = 9;
  string gl_project_name = 10;
  string gl_project_namespace = 11;
}

// --- InfoRefs (advertisement phase) ---

message InfoRefsRequest {
  Repository repository = 1;
}

// --- PostUploadPackWithSidechannel ---

message PostUploadPackWithSidechannelRequest {
  Repository repository = 1;
  // NOTE: bytes data = 2 was removed intentionally.
  // Gitaly interprets this field as git config options, not pack data.
  // Sidechannel transfers pack data over a separate yamux stream.
}

message PostUploadPackWithSidechannelResponse {
}

// --- PostReceivePack ---

message PostReceivePackRequest {
  Repository repository = 1;
  bytes data = 2;
}

message PostReceivePackResponse {
  bytes data = 1;
}

service SmartHTTPService {
  rpc InfoRefsUploadPack(InfoRefsRequest) returns (stream PostUploadPackWithSidechannelResponse);
  rpc InfoRefsReceivePack(InfoRefsRequest) returns (stream PostReceivePackResponse);
  rpc PostUploadPackWithSidechannel(PostUploadPackWithSidechannelRequest) returns (PostUploadPackWithSidechannelResponse);
  rpc PostReceivePack(stream PostReceivePackRequest) returns (stream PostReceivePackResponse);
}
